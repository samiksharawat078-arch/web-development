<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROCK-PAPER-SCISSORS</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <p class="title">ROCK PAPER SCISSORS</p>

    <button class="moves-button js-rock-button"><img class="moves" src="rock-emoji.png" alt=""></button>
    <button class="moves-button js-paper-button"><img class="moves" src="paper-emoji.png" alt=""></button>
    <button class="moves-button js-scissors-button"><img class="moves" src="scissors-emoji.png" alt=""></button>

    <p class="js-result result"></p>
    <p class="js-moves"></p>
    <p class="js-score scores"></p>


    <button class="reset js-reset-button">Reset score</button>

    <button class="auto-play-button js-auto-play-button">Auto Play</button>

    <p class="js-reset-confirmation"></p>

    <script src="script.js"></script>

</body>

</html>
