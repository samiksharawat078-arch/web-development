<!DOCTYPE html>
<html>

<head>
    <title>
        absolute position
    </title>
    <style>
        body {
            padding-bottom: 200px;
        }

        .close {

            color: white;
            background-color: black;
            position: absolute;
            padding-left: 9px;
            padding-right: 9px;
            padding-top: 5px;
            padding-bottom: 5px;
            border-radius: 20px;
            top: -8px;
            left: -8px;
        }

        .sticky-note {
            width: 320px;
            height: 180px;
            background-color: rgb(167, 164, 164);
            position: fixed;
            bottom: 10px;
            right: 10px;
        }
        .time-lapse{
            background-color: black;
            color: white;
            position: absolute;
            bottom: 8px;
            right: 5px;
            font-family: arial;
            font-size: 12px;
            font-weight: 500;
            padding: 2px;
        }
    </style>
</head>

<body>

    <body>



        <div class="sticky-note">
            <div class="close">
                X
            </div>
            <div class="time-lapse">
                10:56
            </div>


        </div>

    </body>
</body>

</html>
