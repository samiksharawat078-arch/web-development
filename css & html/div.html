<!DOCTYPE html>

    <style>

            padding-bottom: 10px;
            padding-left: 25px;
            padding-right: 25px;
            padding-top: 10px;
            margin-left: 5px;
            border-radius:  10px ;
            cursor: pointer;
        }
        .buton:HOVER{

        }
        .buton:active{
         background-color: green;
        }
