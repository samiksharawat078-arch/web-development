<!DOCTYPE html>
<html>

<head>
    <title>
        css position
    </title>
    <style>
        .right-sidebar {
            background-color: green;
            color: rgb(255, 250, 250);
            position: fixed;
            top: 0;
            right: 0;
            bottom: 0;
            width: 90px;

        }

        .overlay {
            background-color: rgba(0, 0, 0, 0.5);
            position: fixed;
            right: 0;
            top: 0;
            left: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .overlay2 {
            justify-content: center;
            display: flex;
            flex-direction: column;
            border: 1px;
            background-color: white;
            border-color: gray;
            border-style: solid;
            height: 150px;
            width: 250px;
            position: fixed;
            left: 140px;
            top: 150px;
            border-radius: 8px;

        }
    </style>
</head>

<body>
    <div class="right-sidebar"> right sidebar</div>

    <div class="overlay">

        <div class="overlay2">

            <div style=" 
                font-family: arial;
                font-size: 20px;
                font-weight: bold;
                padding: 10px;
                ">
                Model Title
            </div>
            <div style=" 
                font-family: arial;
                font-size: 16px;
                padding: 10px;
                ">
                This is a modal
            </div>
            <div style=" 
                font-family: arial;
                font-size: 20px;
                padding: 10px;
                ">
                <button style=" 
                 border-radius: 4px;
                 border-style: solid;
                border-color: rgb(156, 154, 154);
                ">
                    close
                </button>
            </div>
        </div>
    </div>
</body>

</html>
